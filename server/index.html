<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Flow Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #00d2ff;
        }
        .container {
            background-color: #2a2a40;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 300px;
        }
        .value {
            font-size: 2.5em;
            margin: 10px 0;
            font-weight: bold;
        }
        .axis-x { color: #ff5252; }
        .axis-y { color: #69f0ae; }
        .axis-z { color: #448aff; }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: #ff5252;
            font-weight: bold;
        }
        .connected {
            background-color: #69f0ae;
            color: #1e1e2f;
        }
    </style>
</head>
<body>

    <h1>G-Flow Acelerómetro</h1>
    <div class="container">
        <div>Eje X: <span id="x" class="value axis-x">0.00</span></div>
        <div>Eje Y: <span id="y" class="value axis-y">0.00</span></div>
        <div>Eje Z: <span id="z" class="value axis-z">0.00</span></div>
    </div>
    
    <div id="status" class="status">Esperando conexión...</div>

    <script>
        // Obtener la IP actual del navegador (localhost u otra)
        const host = window.location.host;
        const ws = new WebSocket(`ws://${host}/ws/web`);

        ws.onopen = function(event) {
            const statusDiv = document.getElementById("status");
            statusDiv.textContent = "🟢 Dashboard Web Conectado (Esperando datos de la App...)";
            statusDiv.classList.add("connected");
        };

        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                // Actualizar los valores en la interfaz, con 2 decimales
                document.getElementById('x').textContent = parseFloat(data.x).toFixed(2);
                document.getElementById('y').textContent = parseFloat(data.y).toFixed(2);
                document.getElementById('z').textContent = parseFloat(data.z).toFixed(2);
            } catch (e) {
                console.error("Error al procesar datos:", e);
            }
        };

        ws.onclose = function(event) {
            const statusDiv = document.getElementById("status");
            statusDiv.textContent = "🔴 Desconectado del servidor";
            statusDiv.classList.remove("connected");
        };
    </script>
</body>
</html>
